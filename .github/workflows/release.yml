name: Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a tag starting with 'v' (e.g., v0.1.0)

permissions:
  contents: write

jobs:
  build-release:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: jlog
            release_name: jlog-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: jlog
            release_name: jlog-mac-x86_64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename artifact for release
      shell: bash
      run: |
        mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.release_name }}

    - name: Upload binaries to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.release_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
